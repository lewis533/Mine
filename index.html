<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mine</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3a;
    --accent: #7c6cfc;
    --accent2: #fc6c8f;
    --text: #f0f0f8;
    --muted: #7070a0;
    --success: #4ade80;
    --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

  /* AUTH SCREEN */
  #auth-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 30% 20%, #1a1040 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, #200d20 0%, transparent 60%),
                var(--bg);
  }
  .auth-card {
    text-align: center;
    padding: 60px 48px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 28px;
    max-width: 420px;
    width: 90%;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
    animation: fadeUp 0.6s ease;
  }
  .logo { font-family: 'Syne', sans-serif; font-size: 2.4rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; }
  .logo span { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .auth-subtitle { color: var(--muted); font-size: 0.95rem; margin-bottom: 40px; line-height: 1.6; }
  .btn-google {
    width: 100%;
    padding: 16px 24px;
    background: white;
    color: #1a1a1a;
    border: none;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-google:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  .btn-google svg { width: 20px; height: 20px; }

  /* APP SHELL */
  #app { display: none; flex-direction: column; min-height: 100vh; }
  
  /* TOP NAV */
  .topnav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.3rem; }
  .nav-logo span { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .nav-user { display: flex; align-items: center; gap: 10px; }
  .nav-avatar { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
  .nav-name { font-size: 0.85rem; color: var(--muted); max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .btn-signout { background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
  .btn-signout:hover { border-color: var(--accent2); color: var(--accent2); }

  /* BOTTOM TAB NAV */
  .botnav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: rgba(13,13,20,0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    height: 64px;
  }
  .tab-btn {
    flex: 1; background: none; border: none; color: var(--muted);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; cursor: pointer; font-size: 0.65rem; font-family: 'DM Sans', sans-serif;
    transition: color 0.2s; position: relative;
  }
  .tab-btn.active { color: var(--accent); }
  .tab-btn.active::before {
    content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 32px; height: 2px; background: var(--accent); border-radius: 0 0 4px 4px;
  }
  .tab-btn svg { width: 22px; height: 22px; }

  /* MAIN CONTENT */
  .main { flex: 1; padding: 16px 16px 80px; max-width: 640px; margin: 0 auto; width: 100%; }

  /* PAGES */
  .page { display: none; animation: fadeUp 0.3s ease; }
  .page.active { display: block; }

  /* FEED */
  .feed-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .feed-title { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 700; }
  .btn-upload {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; color: white; padding: 10px 18px; border-radius: 12px;
    font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 0.9rem;
    cursor: pointer; display: flex; align-items: center; gap: 6px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-upload:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124,108,252,0.4); }
  .btn-upload svg { width: 16px; height: 16px; }

  /* UPLOAD MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
    align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 28px 28px 0 0; padding: 28px 24px 48px;
    width: 100%; max-width: 640px;
    animation: slideUp 0.3s ease;
  }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 24px; }
  .modal-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.2rem; margin-bottom: 20px; }
  .upload-drop {
    border: 2px dashed var(--border); border-radius: var(--radius);
    padding: 40px 20px; text-align: center; cursor: pointer;
    transition: border-color 0.2s, background 0.2s; margin-bottom: 16px;
  }
  .upload-drop:hover, .upload-drop.dragover { border-color: var(--accent); background: rgba(124,108,252,0.05); }
  .upload-drop svg { width: 40px; height: 40px; color: var(--muted); margin-bottom: 12px; }
  .upload-drop p { color: var(--muted); font-size: 0.9rem; }
  .upload-drop strong { color: var(--accent); }
  #file-input { display: none; }
  .upload-preview { display: none; margin-bottom: 16px; position: relative; }
  .upload-preview img, .upload-preview video { width: 100%; border-radius: var(--radius); max-height: 200px; object-fit: cover; }
  .upload-preview .remove-preview {
    position: absolute; top: 8px; right: 8px;
    background: rgba(0,0,0,0.6); border: none; color: white;
    width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 1rem;
  }
  .caption-input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
    resize: none; outline: none; margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .caption-input:focus { border-color: var(--accent); }
  .btn-post {
    width: 100%; padding: 16px; background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; color: white; border-radius: var(--radius);
    font-family: 'Syne', sans-serif; font-weight: 600; font-size: 1rem;
    cursor: pointer; transition: opacity 0.2s, transform 0.15s;
  }
  .btn-post:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-post:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* PROGRESS BAR */
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 16px; overflow: hidden; display: none; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width 0.3s; }

  /* POST CARDS */
  .post-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; overflow: hidden; margin-bottom: 16px;
    animation: fadeUp 0.4s ease;
  }
  .post-header { padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
  .post-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); }
  .post-avatar-placeholder {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem; color: white; flex-shrink: 0;
  }
  .post-meta { flex: 1; }
  .post-name { font-weight: 500; font-size: 0.9rem; }
  .post-time { font-size: 0.75rem; color: var(--muted); }
  .post-media { width: 100%; max-height: 400px; object-fit: cover; display: block; background: var(--surface2); }
  .post-body { padding: 14px 16px; }
  .post-caption { font-size: 0.9rem; line-height: 1.5; margin-bottom: 12px; }
  .post-actions { display: flex; gap: 16px; }
  .like-btn {
    background: none; border: none; color: var(--muted); cursor: pointer;
    display: flex; align-items: center; gap: 6px; font-size: 0.85rem;
    font-family: 'DM Sans', sans-serif; transition: color 0.2s; padding: 0;
  }
  .like-btn:hover, .like-btn.liked { color: var(--accent2); }
  .like-btn svg { width: 18px; height: 18px; }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.4; }
  .empty-state p { font-size: 0.95rem; line-height: 1.6; }

  /* CHAT */
  .chat-header { margin-bottom: 16px; }
  .chat-title { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
  .chat-subtitle { font-size: 0.85rem; color: var(--muted); }
  .chat-messages {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; height: 60vh; overflow-y: auto;
    padding: 16px; display: flex; flex-direction: column; gap: 12px;
    margin-bottom: 16px; scroll-behavior: smooth;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .msg { display: flex; gap: 8px; max-width: 85%; animation: fadeUp 0.2s ease; }
  .msg.mine { align-self: flex-end; flex-direction: row-reverse; }
  .msg-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; flex-shrink: 0; align-self: flex-end; }
  .msg-avatar-placeholder {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 700; color: white; flex-shrink: 0; align-self: flex-end;
  }
  .msg-content { display: flex; flex-direction: column; gap: 4px; }
  .msg-name { font-size: 0.72rem; color: var(--muted); padding: 0 4px; }
  .msg.mine .msg-name { text-align: right; }
  .msg-bubble {
    background: var(--surface2); padding: 10px 14px; border-radius: 16px 16px 16px 4px;
    font-size: 0.9rem; line-height: 1.5; word-break: break-word;
  }
  .msg.mine .msg-bubble { background: linear-gradient(135deg, var(--accent), #6a5ce8); border-radius: 16px 16px 4px 16px; color: white; }
  .msg-time { font-size: 0.68rem; color: var(--muted); padding: 0 4px; }
  .msg.mine .msg-time { text-align: right; }
  .chat-input-row { display: flex; gap: 10px; align-items: flex-end; }
  .chat-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 12px 16px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
    resize: none; outline: none; max-height: 100px; min-height: 44px;
    transition: border-color 0.2s;
  }
  .chat-input:focus { border-color: var(--accent); }
  .btn-send {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; color: white; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-send:hover { transform: scale(1.05); box-shadow: 0 4px 16px rgba(124,108,252,0.4); }
  .btn-send svg { width: 18px; height: 18px; }

  /* PROFILE */
  .profile-hero {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 28px 20px; text-align: center; margin-bottom: 20px;
  }
  .profile-pic { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); margin-bottom: 14px; }
  .profile-name { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; }
  .profile-email { font-size: 0.85rem; color: var(--muted); }
  .profile-stats { display: flex; gap: 0; margin-top: 20px; border-top: 1px solid var(--border); padding-top: 20px; }
  .stat { flex: 1; text-align: center; }
  .stat + .stat { border-left: 1px solid var(--border); }
  .stat-num { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.4rem; }
  .stat-label { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
  .my-posts-title { font-family: 'Syne', sans-serif; font-weight: 700; margin-bottom: 16px; }
  .posts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .grid-item { aspect-ratio: 1; border-radius: 12px; overflow: hidden; background: var(--surface); cursor: pointer; }
  .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; display: block; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface2); border: 1px solid var(--border);
    padding: 12px 20px; border-radius: 12px; font-size: 0.85rem;
    z-index: 300; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--success); color: var(--success); }
  .toast.error { border-color: var(--accent2); color: var(--accent2); }

  /* LOADING */
  .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; }
  .loader { display: flex; justify-content: center; padding: 40px; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="logo"><span>M</span>ine</div>
    <p class="auth-subtitle">Share photos & videos, chat with friends — all in one place.</p>
    <button class="btn-google" onclick="signInWithGoogle()">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav class="topnav">
    <div class="nav-logo"><span>M</span>ine</div>
    <div class="nav-user">
      <img class="nav-avatar" id="nav-avatar" src="" alt="">
      <span class="nav-name" id="nav-name"></span>
      <button class="btn-signout" onclick="signOut()">Sign out</button>
    </div>
  </nav>

  <main class="main">
    <!-- FEED PAGE -->
    <div class="page active" id="page-feed">
      <div class="feed-header">
        <div class="feed-title">Feed</div>
        <button class="btn-upload" onclick="openUpload()">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          Post
        </button>
      </div>
      <div id="feed-list"><div class="loader"><div class="spinner"></div></div></div>
    </div>

    <!-- CHAT PAGE -->
    <div class="page" id="page-chat">
      <div class="chat-header">
        <div class="chat-title">Group Chat</div>
        <div class="chat-subtitle">Everyone can see messages here</div>
      </div>
      <div class="chat-messages" id="chat-messages">
        <div class="loader"><div class="spinner"></div></div>
      </div>
      <div class="chat-input-row">
        <textarea class="chat-input" id="chat-input" placeholder="Type a message..." rows="1" onkeydown="chatKeyDown(event)"></textarea>
        <button class="btn-send" onclick="sendMessage()">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
        </button>
      </div>
    </div>

    <!-- PROFILE PAGE -->
    <div class="page" id="page-profile">
      <div class="profile-hero">
        <img class="profile-pic" id="profile-pic" src="" alt="">
        <div class="profile-name" id="profile-name"></div>
        <div class="profile-email" id="profile-email"></div>
        <div class="profile-stats">
          <div class="stat"><div class="stat-num" id="stat-posts">0</div><div class="stat-label">Posts</div></div>
          <div class="stat"><div class="stat-num" id="stat-likes">0</div><div class="stat-label">Likes</div></div>
        </div>
      </div>
      <div class="my-posts-title">My Posts</div>
      <div class="posts-grid" id="my-posts-grid"></div>
    </div>
  </main>

  <nav class="botnav">
    <button class="tab-btn active" onclick="showTab('feed', this)">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline stroke-linecap="round" stroke-linejoin="round" stroke-width="2" points="9 22 9 12 15 12 15 22"/></svg>
      Feed
    </button>
    <button class="tab-btn" onclick="showTab('chat', this)">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
      Chat
    </button>
    <button class="tab-btn" onclick="showTab('profile', this)">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      Profile
    </button>
  </nav>
</div>

<!-- UPLOAD MODAL -->
<div class="modal-overlay" id="upload-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Share something</div>
    <div class="upload-drop" id="upload-drop" onclick="document.getElementById('file-input').click()" ondragover="dragOver(event)" ondrop="dropFile(event)" ondragleave="dragLeave(event)">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
      <p>Tap to choose a <strong>photo or video</strong></p>
    </div>
    <input type="file" id="file-input" accept="image/*,video/*" onchange="fileSelected(event)">
    <div class="upload-preview" id="upload-preview">
      <button class="remove-preview" onclick="removePreview()">×</button>
    </div>
    <div class="progress-bar" id="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <textarea class="caption-input" id="caption-input" placeholder="Write a caption..." rows="2"></textarea>
    <button class="btn-post" id="btn-post" onclick="submitPost()">Share Post</button>
    <button onclick="closeUpload()" style="width:100%;margin-top:10px;background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.9rem;cursor:pointer;padding:8px;">Cancel</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- FIREBASE + APP SCRIPTS -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbSignOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, onSnapshot, orderBy, query, serverTimestamp, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ── CONFIG ──────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyBQaBmm1Ydr8rx2KWop8cQrOn4n30hAixQ",
  authDomain: "lewi-b41e7.firebaseapp.com",
  projectId: "lewi-b41e7",
  storageBucket: "lewi-b41e7.firebasestorage.app",
  messagingSenderId: "411640151338",
  appId: "1:411640151338:web:21b6e8e059b20d69163253"
};
const CLOUDINARY_CLOUD = "ddrpctqpl";
const CLOUDINARY_PRESET = "mine_unsigned";
// ────────────────────────────────────────────────────────

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);
const provider = new GoogleAuthProvider();

let currentUser = null;
let selectedFile = null;
let chatUnsub = null;
let feedUnsub = null;

// expose to window for onclick handlers
window.signInWithGoogle = async () => {
  try { await signInWithPopup(auth, provider); }
  catch(e) { showToast("Sign in failed: " + e.message, "error"); }
};
window.signOut = async () => {
  if(chatUnsub) chatUnsub();
  if(feedUnsub) feedUnsub();
  await fbSignOut(auth);
};
window.showTab = (tab, btn) => {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  btn.classList.add('active');
  if(tab === 'profile') loadProfile();
};
window.openUpload = () => { document.getElementById('upload-modal').classList.add('open'); };
window.closeUpload = () => {
  document.getElementById('upload-modal').classList.remove('open');
  removePreview(); document.getElementById('caption-input').value = '';
};
window.dragOver = (e) => { e.preventDefault(); document.getElementById('upload-drop').classList.add('dragover'); };
window.dragLeave = () => document.getElementById('upload-drop').classList.remove('dragover');
window.dropFile = (e) => { e.preventDefault(); dragLeave(); const f = e.dataTransfer.files[0]; if(f) previewFile(f); };
window.fileSelected = (e) => { const f = e.target.files[0]; if(f) previewFile(f); };
window.removePreview = () => {
  selectedFile = null;
  const p = document.getElementById('upload-preview');
  p.innerHTML = '<button class="remove-preview" onclick="removePreview()">×</button>';
  p.style.display = 'none';
  document.getElementById('upload-drop').style.display = 'block';
  document.getElementById('file-input').value = '';
};
window.submitPost = submitPost;
window.sendMessage = sendMessage;
window.chatKeyDown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };

function previewFile(file) {
  selectedFile = file;
  const prev = document.getElementById('upload-preview');
  const drop = document.getElementById('upload-drop');
  prev.innerHTML = '<button class="remove-preview" onclick="removePreview()">×</button>';
  const el = file.type.startsWith('video') ? document.createElement('video') : document.createElement('img');
  el.src = URL.createObjectURL(file);
  if(el.tagName === 'VIDEO') { el.controls = true; el.muted = true; }
  prev.insertBefore(el, prev.firstChild);
  prev.style.display = 'block';
  drop.style.display = 'none';
}

async function uploadToCloudinary(file) {
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CLOUDINARY_PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/auto/upload`, { method: 'POST', body: fd });
  if(!res.ok) throw new Error('Upload failed');
  return await res.json();
}

async function submitPost() {
  if(!selectedFile) { showToast("Please choose a photo or video", "error"); return; }
  const btn = document.getElementById('btn-post');
  const bar = document.getElementById('progress-bar');
  const fill = document.getElementById('progress-fill');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  bar.style.display = 'block'; fill.style.width = '20%';
  try {
    fill.style.width = '50%';
    const result = await uploadToCloudinary(selectedFile);
    fill.style.width = '80%';
    await addDoc(collection(db, 'posts'), {
      uid: currentUser.uid,
      displayName: currentUser.displayName,
      photoURL: currentUser.photoURL,
      mediaUrl: result.secure_url,
      mediaType: selectedFile.type.startsWith('video') ? 'video' : 'image',
      caption: document.getElementById('caption-input').value.trim(),
      likes: [],
      createdAt: serverTimestamp()
    });
    fill.style.width = '100%';
    setTimeout(() => { closeUpload(); showToast("Posted! 🎉", "success"); bar.style.display='none'; fill.style.width='0%'; }, 400);
  } catch(e) {
    showToast("Failed to post: " + e.message, "error");
  } finally {
    btn.disabled = false; btn.innerHTML = 'Share Post';
  }
}

function loadFeed() {
  const q = query(collection(db, 'posts'), orderBy('createdAt', 'desc'));
  feedUnsub = onSnapshot(q, snap => {
    const list = document.getElementById('feed-list');
    if(snap.empty) { list.innerHTML = `<div class="empty-state"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg><p>No posts yet.<br>Be the first to share something!</p></div>`; return; }
    list.innerHTML = snap.docs.map(d => postHTML(d.id, d.data())).join('');
  });
}

function postHTML(id, p) {
  const liked = p.likes && p.likes.includes(currentUser.uid);
  const likeCount = p.likes ? p.likes.length : 0;
  const media = p.mediaType === 'video'
    ? `<video class="post-media" src="${p.mediaUrl}" controls playsinline></video>`
    : `<img class="post-media" src="${p.mediaUrl}" alt="post" loading="lazy">`;
  const avatar = p.photoURL
    ? `<img class="post-avatar" src="${p.photoURL}" alt="">`
    : `<div class="post-avatar-placeholder">${(p.displayName||'?')[0]}</div>`;
  const time = p.createdAt ? timeAgo(p.createdAt.toDate()) : 'just now';
  return `<div class="post-card">
    <div class="post-header">${avatar}<div class="post-meta"><div class="post-name">${p.displayName||'User'}</div><div class="post-time">${time}</div></div></div>
    ${media}
    <div class="post-body">
      ${p.caption ? `<div class="post-caption">${p.caption}</div>` : ''}
      <div class="post-actions">
        <button class="like-btn ${liked?'liked':''}" onclick="toggleLike('${id}', ${JSON.stringify(p.likes||[])})">
          <svg fill="${liked?'currentColor':'none'}" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
          ${likeCount} ${likeCount === 1 ? 'like' : 'likes'}
        </button>
      </div>
    </div>
  </div>`;
}

window.toggleLike = async (postId, likes) => {
  const uid = currentUser.uid;
  const newLikes = likes.includes(uid) ? likes.filter(l=>l!==uid) : [...likes, uid];
  await updateDoc(doc(db, 'posts', postId), { likes: newLikes });
};

function loadChat() {
  const q = query(collection(db, 'messages'), orderBy('createdAt', 'asc'));
  chatUnsub = onSnapshot(q, snap => {
    const box = document.getElementById('chat-messages');
    if(snap.empty) { box.innerHTML = `<div class="empty-state"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg><p>No messages yet.<br>Say hello!</p></div>`; return; }
    box.innerHTML = snap.docs.map(d => msgHTML(d.data())).join('');
    box.scrollTop = box.scrollHeight;
  });
}

function msgHTML(m) {
  const mine = m.uid === currentUser.uid;
  const avatar = m.photoURL
    ? `<img class="msg-avatar" src="${m.photoURL}" alt="">`
    : `<div class="msg-avatar-placeholder">${(m.displayName||'?')[0]}</div>`;
  const time = m.createdAt ? timeAgo(m.createdAt.toDate()) : 'just now';
  return `<div class="msg ${mine?'mine':''}">
    ${!mine ? avatar : ''}
    <div class="msg-content">
      ${!mine ? `<div class="msg-name">${m.displayName||'User'}</div>` : ''}
      <div class="msg-bubble">${escHtml(m.text)}</div>
      <div class="msg-time">${time}</div>
    </div>
    ${mine ? avatar : ''}
  </div>`;
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if(!text) return;
  input.value = '';
  await addDoc(collection(db, 'messages'), {
    uid: currentUser.uid,
    displayName: currentUser.displayName,
    photoURL: currentUser.photoURL,
    text, createdAt: serverTimestamp()
  });
}

async function loadProfile() {
  document.getElementById('profile-pic').src = currentUser.photoURL || '';
  document.getElementById('profile-name').textContent = currentUser.displayName || 'User';
  document.getElementById('profile-email').textContent = currentUser.email || '';
  const q = query(collection(db, 'posts'), orderBy('createdAt', 'desc'));
  const snap = await getDocs(q);
  const mine = snap.docs.filter(d => d.data().uid === currentUser.uid);
  document.getElementById('stat-posts').textContent = mine.length;
  const totalLikes = mine.reduce((sum, d) => sum + (d.data().likes?.length || 0), 0);
  document.getElementById('stat-likes').textContent = totalLikes;
  const grid = document.getElementById('my-posts-grid');
  if(mine.length === 0) { grid.innerHTML = `<p style="color:var(--muted);font-size:0.85rem;grid-column:span 2">No posts yet</p>`; return; }
  grid.innerHTML = mine.map(d => {
    const p = d.data();
    return p.mediaType === 'video'
      ? `<div class="grid-item"><video src="${p.mediaUrl}" muted playsinline></video></div>`
      : `<div class="grid-item"><img src="${p.mediaUrl}" alt="" loading="lazy"></div>`;
  }).join('');
}

// Auth state
onAuthStateChanged(auth, user => {
  if(user) {
    currentUser = user;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('nav-avatar').src = user.photoURL || '';
    document.getElementById('nav-name').textContent = user.displayName || 'User';
    loadFeed();
    loadChat();
  } else {
    currentUser = null;
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

// Helpers
function timeAgo(date) {
  const s = Math.floor((Date.now() - date) / 1000);
  if(s < 60) return 'just now';
  if(s < 3600) return Math.floor(s/60) + 'm ago';
  if(s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}
window.showToast = showToast;
</script>
</body>
</html>
